<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gareth AI</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.15.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.0/dist/katex.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-python.min.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Nanum+Gothic&display=swap');

body, html {
    height: 100%;
    width: 100%;
    margin: 0;
    font-family: "Inter", sans-serif;
    background-color: #f0f0f0;
    overflow: hidden;
}

#main-container {
    display: flex;
    height: 100%;
    width: 100%;
}

#sidebar {
    width: 200px;
    background-color: #f0f0f0;
    padding: 20px;
    border-right: 1px solid #e0e0e0;
}

#model-select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 2px solid #4a90e2;
    border-radius: 25px;
    outline: none;
    transition: border-color 0.3s;
    background-color: white;
}

#model-select:focus {
    border-color: #3a7bc8;
}

#change-model-button {
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #4a90e2;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background-color 0.3s, transform 0.1s;
}

#change-model-button:hover {
    background-color: #3a7bc8;
}

#change-model-button:active {
    transform: scale(0.98);
}

#chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: auto;
    margin: 0;
    background-color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

#chat-header {
    background-color: #4a90e2;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: relative;
}

#chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
}

#chat-messages::-webkit-scrollbar {
    width: 10px;
}

#chat-messages::-webkit-scrollbar-track {
    background: #1e1e1e;
}

#chat-messages::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 5px;
}

#chat-messages::-webkit-scrollbar-thumb:hover {
    background: #555;
}

#user-input {
    display: flex;
    padding: 20px;
    background-color: #f9f9f9;
    border-top: 1px solid #e0e0e0;
    flex-shrink: 0;
}

#message-input {
    flex: 1;
    padding: 12px 20px;
    font-size: 16px;
    border: 2px solid #4a90e2;
    border-radius: 25px;
    outline: none;
    transition: border-color 0.3s;
}

#message-input:focus {
    border-color: #3a7bc8;
}

#send-button {
    padding: 12px 25px;
    background-color: #4a90e2;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin-left: 10px;
    font-size: 16px;
    font-weight: bold;
    transition: background-color 0.3s, transform 0.1s;
}

#send-button:hover {
    background-color: #3a7bc8;
}

#send-button:active {
    transform: scale(0.98);
}

.message {
    max-width: 80%;
    margin-bottom: 15px;
    padding: 15px 20px;
    border-radius: 20px;
    font-size: 16px;
    line-height: 1.4;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    animation: fadeIn 0.5s;
    word-wrap: break-word;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.bot-message {
    align-self: flex-start;
    background-color: #e6f2ff;
    color: #333;
    border-bottom-left-radius: 5px;
}

.user-message {
    align-self: flex-end;
    background-color: #4a90e2;
    color: white;
    border-bottom-right-radius: 5px;
}

.latex-formula {
    margin: 10px 0;
    overflow-x: auto;
}

.latex-formula.display-mode {
    text-align: center;
}

.latex-formula.inline-mode {
    display: inline-block;
    margin: 0 5px;
}

.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
}

.theme-switch {
    display: none;
}

.theme-label {
    display: inline-block;
    width: 50px;
    height: 24px;
    background-color: #ccc;
    border-radius: 34px;
    position: relative;
    cursor: pointer;
    transition: background-color 0.3s;
}

.theme-label::before {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
    transition: transform 0.3s;
}

.theme-switch:checked + .theme-label {
    background-color: #4a90e2;
}

.theme-switch:checked + .theme-label::before {
    transform: translateX(26px);
}

body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
}

body.dark-mode #chat-container {
    background-color: #1e1e1e;
}

body.dark-mode #chat-header {
    background-color: #333;
    color: #e0e0e0;
}

body.dark-mode #user-input {
    background-color: #2e2e2e;
    border-top: 1px solid #555;
}

body.dark-mode #message-input {
    background-color: #333;
    color: #e0e0e0;
    border: 2px solid #555;
}

body.dark-mode #send-button {
    background-color: #555;
    color: #e0e0e0;
}

body.dark-mode .message.user-message {
    background-color: #4a90e2;
}

body.dark-mode .message.bot-message {
    background-color: #333;
    color: #e0e0e0;
}

body.dark-mode #sidebar {
    background-color: #2e2e2e;
    border-right: 1px solid #555;
}

body.dark-mode #model-select {
    background-color: #333;
    color: #e0e0e0;
    border: 2px solid #555;
}

body.dark-mode #chat-messages::-webkit-scrollbar-track {
    background: #1e1e1e;
}

body:not(.dark-mode) #chat-messages {
    background-color: white;
    color: black;
}

body:not(.dark-mode) #message-input {
    background-color: white;
    color: black;
}

.code-block {
    background-color: #1e1e1e;
    border-radius: 8px;
    margin: 10px 0;
    position: relative;
}

.code-block::before {
    content: attr(data-language);
    display: block;
    background-color: #323232;
    color: #e0e0e0;
    padding: 2px 8px;
    font-size: 0.8em;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
}

.code-block pre {
    margin: 0;
    padding: 10px;
    overflow-x: auto;
}

.code-block code {
    font-family: 'Consolas', 'Monaco', 'Andale Mono', 'Ubuntu Mono', monospace;
    font-size: 14px;
}

/* Estilos para dispositivos móviles */
@media screen and (max-width: 768px) {
    body, html {
        overflow: hidden;
        height: 100%;
        position: fixed;
        width: 100%;
    }

    #main-container {
        flex-direction: column;
        height: 100%;
        overflow: hidden;
    }

    #sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        padding: 10px;
        flex-shrink: 0;
        overflow-y: auto;
        max-height: 30vh;
    }

    #chat-container {
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    #chat-header {
        font-size: 20px;
        padding: 10px;
    }

    .message {
        max-width: 90%;
    }

    #user-input {
        padding: 10px;
        position: sticky;
        bottom: 0;
        background-color: #f9f9f9;
        z-index: 10;
    }

    #message-input {
        font-size: 14px;
    }

    #send-button {
        padding: 8px 15px;
        font-size: 14px;
    }

    .theme-toggle {
        top: 10px;
        right: 10px;
    }

    /* Ajustes para el modal de Términos y Condiciones */
    .swal2-popup {
        font-size: 12px !important;
        width: 90% !important;
    }
}

/* Ajustes adicionales para pantallas muy pequeñas */
@media screen and (max-width: 480px) {
    #chat-header {
        font-size: 18px;
    }

    #model-select, #change-model-button {
        font-size: 14px;
    }

    #sidebar {
        max-height: 25vh;
    }
}
        /* CSS para estilizar el checkbox de texto a voz */
        #text-to-speech-container {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    position: relative; /* Añadido para el posicionamiento del pseudo-elemento */
}

#text-to-speech-toggle {
    margin-left: 10px;
    width: 20px;
    height: 20px;
    -webkit-appearance: none;
    appearance: none;
    background-color: #fff;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    vertical-align: middle; /* Alinea verticalmente con el texto */
    position: relative; /* Para el posicionamiento del pseudo-elemento */
}

#text-to-speech-toggle:checked {
    background-color: #4CAF50;
    border-color: #4CAF50;
}

#text-to-speech-toggle:checked::before {
    content: "\2713";
    font-size: 16px;
    color: #fff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
    </style>
</head>
<body>
    <div id="main-container">
        <div id="sidebar">
            <p>Modelos Disponibles</p>
            <select id="model-select">
                <option value="01-ai/Yi-1.5-34B-Chat">GPT-4 (Recomendado)</option>
                <option value="microsoft/Phi-3-mini-4k-instruct">Microsoft Phi-3</option>
                <option value="NousResearch/Nous-Hermes-2-Mixtral-8x7B-DPO">Mixtral-8x7B</option>
            </select>
            <button id="change-model-button">Cambiar Modelo</button>
            <div id="text-to-speech-container">
                <label for="text-to-speech-toggle">Texto a voz</label>
                <input type="checkbox" id="text-to-speech-toggle">
            </div>
        </div>
        <div id="chat-container">
            <div id="chat-header">
                Gareth AI
                <div class="theme-toggle">
                    <input type="checkbox" id="theme-switch" class="theme-switch">
                    <label for="theme-switch" class="theme-label"></label>
                </div>
            </div>
            <div id="chat-messages"></div>
            <div id="user-input">
                <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
                <button id="send-button">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
import { HfInference } from 'https://cdn.jsdelivr.net/npm/@huggingface/inference/+esm';

const inference = new HfInference("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"); 

const chatContainer = document.getElementById('chat-container');
const chatMessages = document.getElementById('chat-messages');
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const modelSelect = document.getElementById('model-select');
const changeModelButton = document.getElementById('change-model-button');
const textToSpeechToggle = document.getElementById('text-to-speech-toggle');

let context = [];

function mostrarTerminosYCondiciones() {
    Swal.fire({
        title: 'Términos y Condiciones',
        html: 
            `<!-- Contenido de los términos y condiciones aquí -->
             <p>Aceptas los términos y condiciones de este bot.</p>
             <p>Que usa tecnología de empresas como Microsoft, Mistral y Yi</p>
             <p>El contenido generado puede ser inexacto o falso en algunos casos
                por eso se requiere verificar con una segunda respuesta</p>`
        ,
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Acepto',
        cancelButtonText: 'No acepto',
        width: '70%',
        heightAuto: false,
        customClass: {
            container: 'custom-swal-container',
            popup: 'custom-swal-popup',
            content: 'custom-swal-content'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            chatContainer.style.display = 'flex';
            agregarMensaje("¡Hola! Soy Gareth. ¿En qué puedo ayudarte hoy?", false);
        } else {
            Swal.fire(
                'Acceso Denegado',
                'Debes aceptar los Términos y Condiciones para usar el chatbot.',
                'error'
            );
        }
    });
}

function agregarMensaje(mensaje, isUser = false) {
    const messageElement = document.createElement('div');
    messageElement.classList.add('message');
    messageElement.classList.add(isUser ? 'user-message' : 'bot-message');
    
    // Procesar bloques de código
    mensaje = mensaje.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
        return `<div class="code-block" data-language="${lang || 'plaintext'}">
            <pre><code class="language-${lang || 'plaintext'}">${code.trim()}</code></pre>
        </div>`;
    });
    
    messageElement.innerHTML = mensaje;
    chatMessages.appendChild(messageElement);
    scrollToBottom();
    renderizarLaTeX(messageElement);
    Prism.highlightAllUnder(messageElement);

    // Agregar mensaje al contexto
    context.push({ role: isUser ? "user" : "assistant", content: mensaje });

    // Convertir texto a voz si está activado
    if (!isUser && textToSpeechToggle.checked) {
        speechSynthesis.speak(new SpeechSynthesisUtterance(mensaje));
    }
}

function renderizarLaTeX(elemento) {
    const textoOriginal = elemento.innerHTML;
    const regex = /(\$\$[\s\S]*?\$\$|\$[^\n$]*?\$)/g;
    let resultado = '';
    let ultimoIndice = 0;

    textoOriginal.replace(regex, (match, formula, indice) => {
        resultado += textoOriginal.slice(ultimoIndice, indice);
        
        try {
            const esDisplayMode = formula.startsWith('$$');
            const formulaLimpia = formula.slice(esDisplayMode ? 2 : 1, -1 * (esDisplayMode ? 2 : 1));
            const formulaRendered = katex.renderToString(formulaLimpia, {
                displayMode: esDisplayMode,
                throwOnError: false
            });
            resultado += formulaRendered;
        } catch (error) {
            console.error('Error al renderizar LaTeX:', error);
            resultado += formula;
        }

        ultimoIndice = indice + formula.length;
    });

    resultado += textoOriginal.slice(ultimoIndice);

    elemento.innerHTML = resultado;
}

function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function handleUserInput() {
    const userMessage = messageInput.value.trim();
    if (userMessage !== '') {
        agregarMensaje(userMessage, true);

        try {
            let botResponse;

            if (/hora|tiempo/.test(userMessage.toLowerCase())) {
                botResponse = await getCurrentTime();
            } else if (/día|dia|fecha/.test(userMessage.toLowerCase())) {
                botResponse = await getCurrentDate();
            } else {
                const searchResult = await searchDuckDuckGo(userMessage);
                botResponse = await getChatCompletion(userMessage, searchResult);
            }

            agregarMensaje(botResponse, false);
        } catch (error) {
            console.error('Error al obtener respuesta del modelo:', error);
            agregarMensaje('Lo siento, hubo un error al procesar tu solicitud.', false);
        }

        messageInput.value = '';
    }
}

async function searchDuckDuckGo(query) {
    const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`);
    const data = await response.json();
    return data.AbstractText || "No se encontró información relevante.";
}

async function getCurrentTime() {
    const response = await fetch('https://worldtimeapi.org/api/ip');
    const data = await response.json();
    return `La hora actual es ${data.datetime.slice(11, 19)}`;
}

async function getCurrentDate() {
    const response = await fetch('https://worldtimeapi.org/api/ip');
    const data = await response.json();
    return `La fecha actual es ${data.datetime.slice(0, 10)}`;
}

async function getChatCompletion(userMessage, searchResult) {
    const selectedModel = modelSelect.value;
    const response = await inference.chatCompletion({
        model: selectedModel,
        messages: [...context, { role: "system", content: searchResult }],
        max_tokens: 3072
    });

    return response.choices[0].message.content;
}

async function cambiarModelo() {
    const nuevoModelo = modelSelect.value;
    inference.model = nuevoModelo;

    // Limpiar mensajes antiguos y contexto
    chatMessages.innerHTML = '';
    context = [];

    // Mostrar saludo
    agregarMensaje(`Modelo cambiado a: ${nuevoModelo}`, false); 
    agregarMensaje("¡Hola! Soy Gareth. ¿En qué puedo ayudarte hoy?", false);
}

function setupEventListeners() {
    sendButton.addEventListener('click', handleUserInput);
    messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            handleUserInput();
        }
    });
    changeModelButton.addEventListener('click', cambiarModelo);
}

window.addEventListener('load', () => {
    mostrarTerminosYCondiciones();
    setupEventListeners();

    const themeSwitch = document.getElementById('theme-switch');
    themeSwitch.addEventListener('change', (event) => {
        if (event.target.checked) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }
    });
});
    </script>
</body>
</html>
